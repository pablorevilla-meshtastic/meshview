<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #f8f5ef;
      --panel: #fffdf8;
      --text: #1f2937;
      --accent: #0f766e;
      --border: #d6d3d1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.10), transparent 25%),
        linear-gradient(180deg, #fdfcf9 0%, var(--bg) 100%);
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 48px auto;
    }

    .card {
      padding: 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }

    .stat {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
    }

    .stat strong,
    .stat span {
      display: block;
    }

    .stat strong {
      font-size: 1.2rem;
    }

    .stat span {
      color: #57534e;
      margin-top: 4px;
    }

    .chart-wrap {
      position: relative;
      height: 360px;
      margin: 24px 0;
    }

    .empty {
      margin-top: 24px;
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
      font-size: 0.95rem;
    }

    th,
    td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    code {
      font-family: "Courier New", monospace;
      background: rgba(15, 118, 110, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      {% block content %}{% endblock %}
    </section>
  </main>
</body>
</html>
